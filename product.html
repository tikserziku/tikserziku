    let currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      const t = T[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key]) el.textContent = t[key];
      });
      // Update badge on featured price card
      document.querySelectorAll('.price-card.featured').forEach(el => {
        el.dataset.badge = t.badge_popular;
      });
      // Update FAQ
      const faqList = document.getElementById('faqList');
      faqList.innerHTML = '';
      t.faq.forEach(([q, a]) => {
        const item = document.createElement('div');
        item.className = 'faq-item';
        item.innerHTML = '<button class="faq-q" onclick="this.classList.toggle(\'open\');this.nextElementSibling.style.maxHeight=this.classList.contains(\'open\')?this.nextElementSibling.scrollHeight+\'px\':\'0\'">' + q + '</button><div class="faq-a"><p>' + a + '</p></div>';
        faqList.appendChild(item);
      });
      // Update lang buttons
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === lang.toUpperCase());
      });
      // Update html lang
      document.documentElement.lang = lang === 'lt' ? 'lt' : lang === 'ru' ? 'ru' : 'en';
      // Save preference
      try { localStorage.setItem('lang', lang); } catch(e) {}
    }

    // Init
    const saved = (() => { try { return localStorage.getItem('lang'); } catch(e) { return null; } })();
    setLang(saved || 'en');

    // Sticky header
    const sticky = document.getElementById('stickyHeader');
    window.addEventListener('scroll', () => { sticky.classList.toggle('visible', window.scrollY > 400); });

    // Reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) setTimeout(() => entry.target.classList.add('visible'), i * 100);
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
